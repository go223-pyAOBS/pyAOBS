# OBEM TSM to SAC Conversion Configuration File
# Example configuration file

[Paths]
# 输入TSM文件所在目录
input_path = /mnt/d/python-learn/pyAOBS/pyAOBS/processors/raw2sac/OBEM2SAC_jf_zjz

# 输出SAC文件目录
output_path = /mnt/d/python-learn/pyAOBS/pyAOBS/processors/raw2sac/OBEM2SAC_jf_zjz

# 台站位置文件（可选，如果配置文件中已指定位置）
location_file = 

[Station]
# 台站名称
station_name = WP12_LM_5K

# 台站位置（纬度、经度、高程）
latitude = 20.5
longitude = 120.3
elevation = -3000.0

# 网络名称
network = WP2022

[Parameters]
# 原始采样率（Hz）
original_srate = 300

# 目标采样率（Hz，插值后）
target_srate = 500

# 数据截取长度（秒，例如6小时=21600秒）
data_length = 3600

# 时间校准（秒）
et = 1.885

# 二进制格式：1=TSM_NEW, 2=TSM_OLD
binaryformat = 1

# 数据年份
year = 2024

