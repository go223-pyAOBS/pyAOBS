# SAC to SEGY Conversion Configuration File
# Example configuration file

[Parameters]
# 声速（m/s），用于计算偏移时间
rv = 6.0

# 道长度（秒）
length = 20.0

# 时间坐标（秒），用于延迟记录时间（delrt = tcoor * (-1000)）
tcoor = 0.0

# 投影中心经度（度），用于UTM投影
lon0 = 120.0

# X方向偏移（米），用于修正GPS天线与震源的距离
ex = 0.0

# Y方向偏移（米），用于修正GPS天线与震源的距离
ey = 0.0

# 时间偏移（秒），用于时间校准
et = 0.0

[Drift]
# 漂移校正部分（可选，如果没有时钟漂移数据，可以省略整个[Drift]部分）
# 开始记录时间（格式：年/月/日 时:分:秒）
# start_time = 2017/02/27 21:18:54

# 结束记录时间（格式：年/月/日 时:分:秒）
# end_time = 2017/06/12 02:05:00

# 漂移量（毫秒）
# drift = 0.082393

[Location]
# 台站位置（可选，如果SAC头中已有位置信息则不需要）
# 格式：lon lat（经度在前，纬度在后）
longitude = 113.436547 
latitude = 16.035029

# 或者从文件读取（如果指定了location_file，则忽略上面的经纬度）
# location_file = loc.in
